<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #0f0f12;
      color: #e4e4e7;
    }
    h1 {
      margin: 0;
      padding: 1rem 1.5rem;
      font-size: 1.25rem;
      font-weight: 600;
      border-bottom: 1px solid #27272a;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .msg {
      max-width: 85%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      line-height: 1.5;
    }
    .msg.user {
      align-self: flex-end;
      background: #3b82f6;
      color: #fff;
    }
    .msg.agent {
      align-self: flex-start;
      background: #27272a;
      border: 1px solid #3f3f46;
    }
    .msg.error {
      align-self: flex-start;
      background: #7f1d1d;
      border-color: #991b1b;
    }
    #form {
      padding: 1rem 1.5rem;
      border-top: 1px solid #27272a;
      display: flex;
      gap: 0.5rem;
    }
    #input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid #3f3f46;
      border-radius: 8px;
      background: #18181b;
      color: #e4e4e7;
      font-size: 1rem;
    }
    #input:focus {
      outline: none;
      border-color: #3b82f6;
    }
    #send {
      padding: 0.75rem 1.25rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
    }
    #send:hover { background: #2563eb; }
    #send:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>AI Agent</h1>
  <div id="messages"></div>
  <form id="form">
    <input type="text" id="input" placeholder="Type a message..." autocomplete="off" />
    <button type="submit" id="send">Send</button>
  </form>
  <script>
    const messagesEl = document.getElementById("messages");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    function addMessage(text, role, isError = false) {
      const div = document.createElement("div");
      div.className = "msg " + (isError ? "error" : role);
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message) return;
      input.value = "";
      addMessage(message, "user");
      sendBtn.disabled = true;
      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });
        const data = await res.json();
        if (!res.ok) {
          addMessage(data.error || "Request failed", "agent", true);
          return;
        }
        addMessage(data.reply, "agent");
      } catch (err) {
        addMessage("Network error: " + err.message, "agent", true);
      } finally {
        sendBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
